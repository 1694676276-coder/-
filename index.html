  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }
    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }
    .bg-noise {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #09090b; }
    ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    
    body {
      background-color: #09090b;
      color: #fafafa;
      cursor: none;
    }
    
    .animate-fadeIn {
      animation: fadeIn 0.5s ease-out forwards;
    }

    #custom-cursor-dot {
      position: fixed;
      top: 0; left: 0;
      width: 8px; height: 8px;
      background-color: white;
      border-radius: 50%;
      pointer-events: none;
      z-index: 100;
      mix-blend-mode: difference;
      transition: transform 0.1s ease-out;
      transform: translate3d(-50%, -50%, 0);
    }

    #custom-cursor-circle {
      position: fixed;
      top: 0; left: 0;
      width: 40px; height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background-color: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(4px);
      border-radius: 50%;
      pointer-events: none;
      z-index: 99;
      transition: transform 0.3s ease-out, opacity 0.3s ease-out, width 0.3s, height 0.3s;
      transform: translate3d(-50%, -50%, 0);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .cursor-hover #custom-cursor-circle {
      transform: translate3d(-50%, -50%, 0) scale(1.8);
      opacity: 0.8;
    }
    .cursor-hover #custom-cursor-dot {
      transform: translate3d(-50%, -50%, 0) scale(0);
    }

    .ping-dot {
      width: 4px; height: 4px;
      background-color: white;
      border-radius: 50%;
      opacity: 0.5;
      animation: ping 1s cubic-bezier(0, 0, 0.2, 1) infinite;
      display: none;
    }
    .cursor-hover .ping-dot { display: block; }
    
    @keyframes ping {
      75%, 100% { transform: scale(2); opacity: 0; }
    }
  </style>
</head>

    function navigate(view, id = null) {
      window.scrollTo({ top: 0, behavior: 'smooth' });
      setTimeout(() => {
        hideAllViews();
        document.getElementById(`view-${view}`).classList.remove('hidden');
        
        if (view === 'detail' || view === 'exhibition' || view === 'exhibition-detail') {
          document.getElementById('global-footer').classList.add('hidden');
        }
        
        if (view === 'home') renderHome();
        if (view === 'about') renderAbout();
        if (view === 'projects') renderAllProjects();
        if (view === 'exhibition') renderExhibition();
        if (view === 'exhibition-detail') renderExhibitionDetail();
        if (view === 'detail') renderProjectDetail(id);
        
        lucide.createIcons();
      }, 300);
    }

          }

            let gridCls = sec.customGrid || (sec.images.length === 2 ? 'md:grid-cols-2 items-start' : sec.images.length === 3 ? 'md:grid-cols-3 items-start' : 'items-start');
            let alignCls = sec.alignItems || '';

              const sClass = sec.imageClasses ? sec.imageClasses[i] : '';
              const frameClass = `relative w-full overflow-hidden flex items-center justify-center interactable group ${sec.noPadding ? '' : 'p-4 md:p-6 bg-zinc-900/30 rounded-2xl md:rounded-[2rem] border border-white/5'} ${sec.imageContainerClass || 'h-fit'} ${sClass}`;
              return `<div class="${frameClass}">
                ${!sec.noPadding ? `<img src="${img}" class="absolute inset-0 w-full h-full object-cover opacity-30 blur-2xl scale-110 pointer-events-none" />` : ''}
                <img src="${img}" class="relative z-10 w-full block h-auto ${sec.noPadding ? 'rounded-none' : 'rounded-lg'} transition-transform duration-700 group-hover:scale-[1.02] drop-shadow-2xl" />
              </div>`;
            }).join('');
            innerContent += `<div class="grid grid-cols-1 ${gridCls} gap-6 md:gap-8 mt-12 ${alignCls}">${imgHTML}</div>`;
          }
          if (sec.videos && sec.videos.length > 0) {
            let gridCls = sec.customGrid || 'items-start';
            let alignCls = sec.alignItems || '';
            let vidHTML = sec.videos.map((vid, i) => {
              const sClass = sec.itemClasses ? sec.itemClasses[i] : '';
              const frameClass = `relative w-full overflow-hidden flex items-center justify-center interactable group ${sec.noPadding ? '' : 'p-4 md:p-6 bg-zinc-900/30 rounded-2xl md:rounded-[2rem] border border-white/5'} ${sec.mediaContainerClass || 'h-fit'} ${sClass}`;
              return `<div class="${frameClass}"><video src="${vid}" controls playsInline class="relative z-10 w-full h-auto block ${sec.noPadding ? 'rounded-none object-cover' : 'object-contain rounded-lg bg-black/50'} transition-transform duration-700 group-hover:scale-[1.02] drop-shadow-2xl"></video></div>`;
            }).join('');
            innerContent += `<div class="grid grid-cols-1 ${gridCls} gap-6 md:gap-8 mt-12 ${alignCls}">${vidHTML}</div>`;
          }
          return `<div class="space-y-8 border-t border-white/10 pt-16 mt-16 first:border-0 first:pt-0 first:mt-0">${innerContent}</div>`;
        }).join('');
      } else {
         sectionsHTML = `<div class="space-y-16 mt-16 pt-16 border-t border-white/10"><div class="relative w-full aspect-[21/9] rounded-3xl overflow-hidden interactable group border border-white/5 bg-zinc-950 flex items-center justify-center p-4"><div class="absolute inset-0 opacity-80 ${p.gradient} transition-transform duration-1000 group-hover:scale-105"></div><div class="absolute inset-0 bg-black/40 backdrop-blur-[2px] pointer-events-none z-20"></div><div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-30"><span class="text-white/60 tracking-[0.3em] text-sm font-light">项目概览</span><span class="text-white/30 tracking-[0.3em] text-[10px] uppercase font-light mt-1">Project Overview</span></div></div></div>`;
      }

      container.innerHTML = `
        <div class="w-full relative z-10 pt-32 pb-0 px-6 md:px-24 min-h-screen animate-fadeIn">
          <div class="flex justify-between items-center mb-16">

          </div>
          <div id="det-header" class="mb-20">
            <h1 class="text-5xl md:text-8xl font-medium text-zinc-100 mb-2 leading-[1.1] tracking-tighter max-w-5xl">${p.title}</h1>
            <h2 class="text-3xl md:text-5xl font-serif italic text-zinc-500 tracking-tighter mb-12">${p.titleEn}</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-x-8 gap-y-12 pt-12 border-t border-white/10">
              <div class="flex flex-col gap-1"><span class="text-zinc-400 text-xs tracking-[0.2em] font-medium">性质</span><span class="text-zinc-600 text-[10px] uppercase tracking-widest mb-1">Nature</span><span class="text-zinc-200 text-lg">${p.nature || "独立项目"}</span></div>
              <div class="flex flex-col gap-1"><span class="text-zinc-400 text-xs tracking-[0.2em] font-medium">角色</span><span class="text-zinc-600 text-[10px] uppercase tracking-widest mb-1">Role</span><span class="text-zinc-200 text-lg">${p.role}</span></div>
              <div class="flex flex-col gap-1"><span class="text-zinc-400 text-xs tracking-[0.2em] font-medium">类别</span><span class="text-zinc-600 text-[10px] uppercase tracking-widest mb-1">Category</span><span class="text-zinc-200 text-lg">${p.category}</span></div>
              <div class="flex flex-col gap-1"><span class="text-zinc-400 text-xs tracking-[0.2em] font-medium">年份</span><span class="text-zinc-600 text-[10px] uppercase tracking-widest mb-1">Year</span><span class="text-zinc-200 text-lg">${p.year}</span></div>
            </div>
          </div>
          
          <div class="relative w-full ${p.heroLayout === 'auto' ? 'aspect-auto rounded-none md:rounded-[2rem]' : 'h-[60vh] md:h-[80vh] rounded-[2rem]'} overflow-hidden mb-32 border border-white/10 shadow-2xl interactable group bg-zinc-950 flex items-center justify-center ${p.heroLayout === 'auto' ? '' : 'p-4 md:p-12'}">
            ${p.heroLayout === 'auto' ? `<img src="${p.image}" class="w-full h-auto block relative z-10 transition-transform duration-1000 group-hover:scale-105" />` : `
              ${p.image ? `<img src="${p.image}" class="absolute inset-0 w-full h-full object-cover opacity-40 blur-3xl scale-110 pointer-events-none" /> <img src="${p.image}" class="w-full h-auto block relative z-10 transition-transform duration-1000 group-hover:scale-105" />` : `<div class="absolute inset-0 opacity-90 ${p.gradient} transition-transform duration-1000 group-hover:scale-105"></div>`}
            `}
            <div class="absolute inset-0 bg-gradient-to-br from-white/10 via-transparent to-black/60 pointer-events-none z-20"></div>
            <div class="absolute bottom-12 right-12 mix-blend-overlay pointer-events-none text-right z-30"><span class="text-white/80 text-sm tracking-widest block">主视觉</span><span class="text-white/50 text-[10px] tracking-widest uppercase">Hero Image</span></div>
          </div>

          <div class="max-w-7xl mx-auto space-y-32">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-12 md:gap-8 items-start">
              <div class="md:col-span-4 space-y-8">
                <div><h2 class="text-2xl md:text-3xl font-medium text-zinc-100 tracking-tight">项目概述</h2><h3 class="text-lg md:text-xl font-serif italic text-zinc-500 mt-1">Project Overview</h3></div>
                <div class="pt-8 border-t border-white/10">
                  <button id="ai-insight-btn" onclick="generateInsight()" class="interactable group flex items-center gap-3 px-6 py-3 rounded-full bg-white/5 border border-white/10 hover:bg-white/10 transition-colors"><i data-lucide="sparkles" class="w-4 h-4 text-blue-400"></i><span id="ai-insight-text" class="text-sm font-medium tracking-wide text-zinc-300 group-hover:text-white transition-colors">生成 AI 深度解析 / Generate AI Insight</span></button>
                  <div id="ai-insight-res" class="hidden mt-6 p-6 rounded-2xl bg-gradient-to-br from-blue-900/10 to-purple-900/10 border border-white/10 backdrop-blur-md shadow-xl relative overflow-hidden"><div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/10 rounded-full blur-[40px]"></div><p id="ai-insight-content" class="text-zinc-300 font-light leading-relaxed relative z-10 whitespace-pre-wrap"></p></div>
                </div>
              </div>
              <div class="md:col-span-8 space-y-4"><p class="text-xl md:text-2xl leading-relaxed font-light text-zinc-200">${p.content}</p><p class="text-lg md:text-xl leading-relaxed font-light text-zinc-500">${p.contentEn}</p></div>
            </div>
            ${sectionsHTML}
          </div>

          <div class="mt-40 border-t border-white/10 relative overflow-hidden bg-zinc-950/50 backdrop-blur-md">
            <div class="absolute inset-0 bg-gradient-to-t from-white/5 to-transparent pointer-events-none"></div>
            <div class="px-6 md:px-24 py-24 flex flex-col items-center justify-center relative z-10 text-center">
              <p class="text-zinc-400 uppercase tracking-widest text-sm mb-1">下一个项目</p><p class="text-zinc-600 uppercase tracking-widest text-[10px] mb-6">Next Project</p>
              <button onclick="navigate('detail', ${nP.id})" class="interactable group flex flex-col items-center gap-4">
                <div class="flex items-center gap-6"><h2 class="text-4xl md:text-7xl font-medium text-zinc-200 group-hover:text-white transition-colors duration-500">${nP.title}</h2><div class="w-16 h-16 rounded-full bg-white/5 border border-white/10 flex items-center justify-center group-hover:bg-white/10 group-hover:scale-110 transition-all duration-500"><i data-lucide="chevron-right" class="w-8 h-8 text-zinc-400 group-hover:text-white"></i></div></div>
                <h3 class="text-xl md:text-3xl font-serif italic text-zinc-600 group-hover:text-zinc-400 transition-colors duration-500">${nP.titleEn}</h3>
              </button>
            </div>
          </div>
        </div>
      `;
    }

    // --- Gemini API Logic (Vanilla JS) ---
    const API_KEY = "";
    
    async function generateContentWithRetry(userPrompt, systemPrompt) {
      if(!API_KEY) return "系统由于安全限制，暂无法调用接口。 / API key missing.";
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`;
      const payload = {
        contents: [{ parts: [{ text: userPrompt }] }],
        systemInstruction: { parts: [{ text: systemPrompt }] }
      };
      const delays = [1000, 2000, 4000, 8000, 16000];
      for (let attempt = 0; attempt < 5; attempt++) {
        try {
          const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          const data = await response.json();
          return data.candidates?.[0]?.content?.parts?.[0]?.text || "系统暂无响应。";
        } catch (error) {
          if (attempt === 4) return "网络波动，请稍后再试。 / Network error, please try again.";
          await new Promise(r => setTimeout(r, delays[attempt]));
        }
      }
    }

    window.handleAIQuery = async function() {
      const input = document.getElementById('ai-input');
      const btn = document.getElementById('ai-btn');
      const resDiv = document.getElementById('ai-response');
      const val = input.value.trim();
      if(!val) return;
      
      btn.disabled = true;
      btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> 发送中...`;
      lucide.createIcons();
      resDiv.classList.add('hidden');
      
      const sysP = `你现在是 ZANE (王梓涵) 个人作品集的“虚拟 AI 策展人”。ZANE 是一位空间设计师和艺术教师，具有以下背景：理念：在广袤的世界版图里，构建独属于我的视觉坐标。学历：马来西亚理科大学创意产业设计硕士。经历：在柒森会展担任展厅设计师。请以专业、绝对客观、理性且简洁精炼的双语（中英）回答。不要有迎合或者主观称赞的表述。`;
      
      const ans = await generateContentWithRetry(val, sysP);
      resDiv.innerHTML = ans;
      resDiv.classList.remove('hidden');
      
      btn.disabled = false;
      btn.innerHTML = `<i data-lucide="message-square" class="w-4 h-4"></i> 发送 / Send`;
      lucide.createIcons();
    };

    window.generateInsight = async function() {
      const btn = document.getElementById('ai-insight-btn');
      const textSpan = document.getElementById('ai-insight-text');
      const resDiv = document.getElementById('ai-insight-res');
      const contentP = document.getElementById('ai-insight-content');
      
      if(btn.disabled) return;
      btn.disabled = true;
      textSpan.innerText = '分析中 / Analyzing...';
      
      const p = window.currentProjectContext;
      const prompt = `项目名称：${p.title}\n类别：${p.category}\n描述：${p.description}\n详情：${p.content}`;
      const sysP = `你是一个高级数字艺术评论家。请根据项目信息，生成一段简短、具美学深度的“AI 策展人点评”（约100字）。提取核心设计价值，内容需绝对客观、理性。用中英双语输出。`;
      
      const ans = await generateContentWithRetry(prompt, sysP);
      contentP.innerText = ans;
      resDiv.classList.remove('hidden');
      textSpan.innerText = 'AI 分析完毕 / AI Insight Ready';
    };

    // --- Initialization & Event Listeners ---
    function initApp() {
      // 1. Initial view setup
      navigate('home');
      
      // 2. Smooth Mouse
      const dot = document.getElementById('custom-cursor-dot');
      const circle = document.getElementById('custom-cursor-circle');
      let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
      let circleX = mouseX, circleY = mouseY;
      
      window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX; mouseY = e.clientY;
        dot.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0)`;
        
        const isInteractable = e.target.closest('a') || e.target.closest('button') || e.target.closest('.interactable');
        if(isInteractable) document.body.classList.add('cursor-hover');
        else document.body.classList.remove('cursor-hover');
      });
      
      function renderCursor() {
        circleX += (mouseX - circleX) * 0.15;
        circleY += (mouseY - circleY) * 0.15;
        // Keep scale/opacity modifications in CSS class handling, just update pos here
        const isHover = document.body.classList.contains('cursor-hover');
        circle.style.transform = `translate3d(${circleX}px, ${circleY}px, 0) scale(${isHover ? 1.8 : 1})`;
        requestAnimationFrame(renderCursor);
      }
      requestAnimationFrame(renderCursor);

      // 3. Background Canvas Animation
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d');
      let time = 0;
      let width, height;
      
      function resizeCanvas() {
        width = window.innerWidth; height = window.innerHeight;
        const dpr = window.devicePixelRatio || 1;
        canvas.width = width * dpr; canvas.height = height * dpr;
        ctx.scale(dpr, dpr);
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      function drawOrb(cx, cy, r, color) {
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
        grad.addColorStop(0, color); grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
      }

      function drawCanvas() {
        time += 0.002;
        ctx.fillStyle = '#09090b'; ctx.fillRect(0, 0, width, height);
        
        const scrollOffset = currentScrollY * 0.15;
        const cx = width / 2, cy = height / 2 - scrollOffset;

        ctx.globalCompositeOperation = 'screen';
        drawOrb(cx + Math.sin(time) * width * 0.3, cy + Math.cos(time * 0.8) * height * 0.3, width * 0.4, 'rgba(124, 58, 237, 0.15)'); 
        drawOrb(cx - Math.sin(time * 1.2) * width * 0.4, cy - Math.cos(time * 0.9) * height * 0.2, width * 0.5, 'rgba(56, 189, 248, 0.1)'); 
        drawOrb(cx + Math.cos(time * 0.7) * width * 0.2, cy + Math.sin(time * 1.1) * height * 0.4, width * 0.3, 'rgba(255, 255, 255, 0.05)'); 

        ctx.globalCompositeOperation = 'source-over';
        const numLines = 70; 
        for(let i = 0; i < numLines; i++) {
          ctx.beginPath();
          const progress = i / numLines; 
          const lineGrad = ctx.createLinearGradient(0, 0, width, 0);
          lineGrad.addColorStop(0, `rgba(255, 255, 255, 0)`);
          lineGrad.addColorStop(0.5, `rgba(255, 255, 255, ${0.02 + Math.sin(progress * Math.PI) * 0.2})`);
          lineGrad.addColorStop(1, `rgba(255, 255, 255, 0)`);
          ctx.strokeStyle = lineGrad;
          ctx.lineWidth = 0.5 + Math.sin(progress * Math.PI) * 1.5; 
          const baseY = cy + (progress - 0.5) * height * 0.8; 
          for(let x = 0; x <= width; x += 15) {
            const xProgress = x / width; 
            const wave1 = Math.sin(xProgress * 4 + time * 3 + progress * 5) * (80 + Math.sin(time) * 20);
            const wave2 = Math.cos(xProgress * 3 - time * 2 + progress * 3) * 60;
            const wave3 = Math.sin(xProgress * 8 + time + progress * 2) * 20;
            const envelope = Math.sin(xProgress * Math.PI) * Math.sin(progress * Math.PI);
            const y = baseY + (wave1 + wave2 + wave3) * envelope;
            if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          }
          ctx.stroke();
        }
        requestAnimationFrame(drawCanvas);
      }
      requestAnimationFrame(drawCanvas);

      // 4. Scroll Parallax Logic
      window.addEventListener('scroll', () => {
        currentScrollY = window.scrollY;
        
        // Manual updates for parallax targets
        const homeContent = document.getElementById('home-hero-content');
        if(homeContent) {
           homeContent.style.transform = `translate3d(0, ${currentScrollY * 0.2}px, 0)`;
           homeContent.style.opacity = Math.max(0, 1 - currentScrollY * 0.003);
        }
        
        const aboutTitle = document.getElementById('about-title');
        const aboutImg = document.getElementById('about-hero-img');
        if(aboutTitle) aboutTitle.style.transform = `translate3d(0, ${currentScrollY * 0.05}px, 0)`;
        if(aboutImg) aboutImg.style.transform = `translate3d(0, ${currentScrollY * 0.1}px, 0) scale(1.05)`;

        const projTitle = document.getElementById('projects-title');
        if(projTitle) projTitle.style.transform = `translate3d(0, ${currentScrollY * 0.1}px, 0)`;

        const exText = document.getElementById('exhib-hero-text');
        if(exText) exText.style.opacity = Math.max(0, 1 - currentScrollY * 0.003);

        const detHead = document.getElementById('det-header');
        if(detHead) detHead.style.transform = `translate3d(0, ${currentScrollY * 0.15}px, 0)`;
        
        const exhibDetHead = document.getElementById('exhib-det-title');
        if(exhibDetHead) exhibDetHead.style.transform = `translate3d(0, ${currentScrollY * 0.15}px, 0)`;
      });
    }

    document.addEventListener("DOMContentLoaded", initApp);
  </script>
